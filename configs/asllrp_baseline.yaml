# Real-ASL four-condition comparison on ASLLRP (the paper's source). BASELINE: static shots, no context.
# NOT the paper's faithful baseline yet: no 3,915-entry Sign Bank dictionary (constrain_vocab off),
# subset of the 84-file corpus, provisional real-ASL prompt, local model. BLEU here is PRELIMINARY.
name: asllrp_baseline
dataset: asllrp
data_dir: data/processed/asllrp
split: test
n_examples: 220
static_shots: 8
constrain_vocab: false
gloss_prompt: asllrp_gloss.md
nmm_prompt: baseline_nmm.md
llm: {provider: open, model: gemma4:latest, temperature: 0.0, seed: 7}
retrieval: {enabled: false}
context: {enabled: false}
