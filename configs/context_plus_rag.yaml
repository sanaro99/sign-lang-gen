# Our full proposed system: paragraph context + retrieved examples.
name: context_plus_rag
dataset: aslg_pc12
split: test
n_examples: 200
constrain_vocab: true
gloss_prompt: context_gloss.md
nmm_prompt: baseline_nmm.md

llm:
  provider: openai
  model: gpt-4o-2024-05-13
  temperature: 0.0
  seed: 7

retrieval:
  enabled: true
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  k: 8
  index_path: data/processed/example_pool.faiss
  pool_path: data/processed/example_pool.jsonl
  order: similarity_desc

context:
  enabled: true
  window_before: 2
  window_after: 1
  include_prior_glosses: true
