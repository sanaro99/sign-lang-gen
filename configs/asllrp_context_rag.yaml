# Full proposed system on real ASL: paragraph context + retrieved examples.
name: asllrp_context_rag
dataset: asllrp
data_dir: data/processed/asllrp
split: test
n_examples: 220
constrain_vocab: false
gloss_prompt: asllrp_context_gloss.md
nmm_prompt: baseline_nmm.md
llm: {provider: open, model: gemma4:latest, temperature: 0.0, seed: 7}
retrieval:
  enabled: true
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  k: 8
  index_path: data/processed/asllrp/example_pool.faiss
  pool_path: data/processed/asllrp/example_pool.jsonl
  order: similarity_desc
context: {enabled: true, window_before: 2, window_after: 1, include_prior_glosses: true}
